version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    binary: issues
    ldflags:
      - -s -w -X github.com/david-truong/liferay-issues-cli/internal/config.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "issues_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: david-truong
      name: homebrew-tap
    homepage: https://github.com/david-truong/liferay-issues-cli
    description: CLI tool for managing Liferay Jira tickets
    license: MIT
    install: |
      bin.install "issues"
    test: |
      system "#{bin}/issues", "--version"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
